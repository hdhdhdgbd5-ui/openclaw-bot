<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Integration Test</title>
    <script src="https://js.puter.com/v2/"></script>
</head>
<body>
    <h1>Testing Gemini Integration</h1>
    <div id="output"></div>
    <script>
        const outputDiv = document.getElementById('output');

        async function runTest() {
            outputDiv.innerHTML = '<p>Starting test...</p>';

            try {
                const response = await puter.ai.chat("Test integration: Summarize the benefits of AI.", {
                    model: 'gemini-3.1-pro-preview',
                    stream: true
                });

                for await (const part of response) {
                    if (part?.text) {
                        outputDiv.innerHTML += `<p>${part.text.replaceAll('\n', '<br>')}</p>`;
                    }
                }

                outputDiv.innerHTML += '<p>Test completed successfully!</p>';
            } catch (error) {
                outputDiv.innerHTML = `<p style="color: red;">Test failed: ${error.message}</p>`;
            }
        }

        runTest();
    </script>
</body>
</html>
