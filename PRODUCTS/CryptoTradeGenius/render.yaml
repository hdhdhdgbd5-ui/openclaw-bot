# Render.com Deployment Configuration
# Deploys the CryptoTradeGenius trading bot

services:
  # Main Trading Bot
  - type: web
    name: cryptotradegenius-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py --paper
    envVars:
      - key: TRADING_MODE
        value: paper
      - key: LOG_LEVEL
        value: INFO
      - key: DATABASE_URL
        fromDatabase:
          name: cryptotradegenius-db
          property: connectionString
      - key: API_SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0
    autoDeploy: true
    plan: standard
    healthCheckPath: /health
    
  # API Server (for monitoring and control)
  - type: web
    name: cryptotradegenius-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py --api
    envVars:
      - key: TRADING_MODE
        value: paper
      - key: LOG_LEVEL
        value: INFO
      - key: DATABASE_URL
        fromDatabase:
          name: cryptotradegenius-db
          property: connectionString
      - key: API_SECRET_KEY
        generateValue: true
      - key: API_PORT
        value: 10000
      - key: PYTHON_VERSION
        value: 3.11.0
    autoDeploy: true
    plan: standard
    healthCheckPath: /health

# PostgreSQL Database
databases:
  - name: cryptotradegenius-db
    databaseName: cryptotradegenius
    user: cryptotrader
    plan: standard
    ipAllowList: []

# Redis Cache (optional - for session/cache)
redis:
  - name: cryptotradegenius-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru
