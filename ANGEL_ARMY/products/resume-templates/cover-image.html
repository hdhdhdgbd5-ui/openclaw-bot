<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Cover - Resume Templates</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a2e;
            padding: 20px;
        }
        .cover {
            width: 1280px;
            height: 720px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        .cover::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 600px;
            height: 600px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
        }
        .cover::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -10%;
            width: 400px;
            height: 400px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
        }
        .badge {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 16px;
            color: white;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 30px;
            border: 2px solid rgba(255,255,255,0.3);
        }
        .title {
            font-size: 72px;
            font-weight: 800;
            color: white;
            text-align: center;
            line-height: 1.1;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .subtitle {
            font-size: 28px;
            color: rgba(255,255,255,0.9);
            text-align: center;
            margin-bottom: 40px;
            font-weight: 300;
        }
        .features {
            display: flex;
            gap: 40px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .feature {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            padding: 20px 30px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .feature-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
        .feature-text {
            color: white;
            font-size: 16px;
            font-weight: 600;
        }
        .price-tag {
            position: absolute;
            top: 40px;
            right: 60px;
            background: #e94560;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 28px;
            font-weight: 800;
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.4);
        }
    </style>
</head>
<body>
    <div class="cover">
        <div class="price-tag">$9.99</div>
        <div class="badge">Digital Download</div>
        <div class="title">Professional<br>Resume Templates</div>
        <div class="subtitle">3 ATS-Friendly Designs • Instant PDF Export</div>
        <div class="features">
            <div class="feature">
                <div class="feature-icon">📄</div>
                <div class="feature-text">3 HTML Templates</div>
            </div>
            <div class="feature">
                <div class="feature-icon">✅</div>
                <div class="feature-text">ATS-Optimized</div>
            </div>
            <div class="feature">
                <div class="feature-icon">⚡</div>
                <div class="feature-text">Easy to Edit</div>
            </div>
        </div>
    </div>
</body>
</html>
