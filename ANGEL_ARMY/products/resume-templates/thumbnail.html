<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thumbnail - Resume Templates</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a2e;
            padding: 20px;
        }
        .thumbnail {
            width: 600px;
            height: 600px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        .thumbnail::before {
            content: '';
            position: absolute;
            top: -30%;
            right: -20%;
            width: 300px;
            height: 300px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
        }
        .icon {
            font-size: 120px;
            margin-bottom: 30px;
            z-index: 1;
        }
        .title {
            font-size: 48px;
            font-weight: 800;
            color: white;
            text-align: center;
            line-height: 1.2;
            margin-bottom: 20px;
            z-index: 1;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .subtitle {
            font-size: 24px;
            color: rgba(255,255,255,0.9);
            text-align: center;
            margin-bottom: 30px;
            z-index: 1;
        }
        .badge {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 28px;
            color: white;
            font-weight: 700;
            z-index: 1;
            border: 3px solid rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
    <div class="thumbnail">
        <div class="icon">📄</div>
        <div class="title">Resume<br>Templates</div>
        <div class="subtitle">3 ATS-Friendly Designs</div>
        <div class="badge">$9.99</div>
    </div>
</body>
</html>
